command.description=A Java CLI for receiver-side workflows.
command.decode.description=Decode QR image sets and restore original files.
command.capture.description=Capture QR frames from a UVC camera source.
option.lang=UI language for help and descriptions: ${COMPLETION-CANDIDATES}
option.in=Input directory to read from. Required for decode
option.out=Output directory. Required for decode, capture
option.device=UVC camera device index for capture mode
option.width=Capture width in pixels
option.height=Capture height in pixels
option.fps=Requested capture FPS
option.duration-seconds=Capture duration in seconds. 0 means until stopped
option.max-payloads=Maximum unique payloads to save in capture mode. 0 means unlimited
option.list-devices=List available capture devices and exit
option.status-interval-ms=Periodic status log interval in milliseconds. 0 disables it
option.decode-workers=Number of QR decode worker threads
option.same-signal-seconds=Stop capture when the same non-black signal continues for this many seconds
option.resume=Resume capture using existing captured-images in the output directory
