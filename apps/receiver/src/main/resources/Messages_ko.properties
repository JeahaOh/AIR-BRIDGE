command.description=receiver 측 작업을 수행하는 CLI 도구입니다.
command.decode.description=QR 이미지 세트를 복원하고 원본 파일을 되살립니다.
command.capture.description=UVC 카메라 입력에서 QR 프레임을 수집합니다.
option.lang=도움말과 설명에 사용할 언어: ${COMPLETION-CANDIDATES}
option.in=읽어올 입력 디렉토리. decode에서 필요
option.out=출력 디렉토리. decode, capture에서 필요
option.device=capture 모드에서 사용할 UVC 카메라 장치 인덱스
option.width=capture 가로 해상도(픽셀)
option.height=capture 세로 해상도(픽셀)
option.fps=capture 요청 FPS
option.duration-seconds=capture 지속 시간(초). 0이면 수동 종료까지 계속
option.max-payloads=capture 모드에서 저장할 최대 고유 payload 수. 0이면 제한 없음
option.list-devices=사용 가능한 capture 장치를 출력하고 종료
option.status-interval-ms=주기 상태 로그 간격(ms). 0이면 비활성화
option.decode-workers=QR decode worker 수
option.same-signal-seconds=같은 비흑색 신호가 이 시간(초) 이상 유지되면 capture 종료
option.resume=출력 디렉토리의 기존 captured-images를 이용해 capture를 이어서 진행
