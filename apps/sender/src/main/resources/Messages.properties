command.description=A Java CLI for sender-side workflows.
command.encode.description=Encode source files and documents into QR images.
command.reencode.description=Regenerate failed files or missing QR chunks from a restore result.
command.slide.description=Launch the bundled Swing slide player.
option.lang=UI language for help and descriptions: ${COMPLETION-CANDIDATES}
option.in=Input directory to read from
option.out=Output directory
option.project-name=Project name
option.encode-root=Base path used for relative paths stored inside QR payloads. Defaults to --in
option.restore-dir=Default directory containing _restore_result.txt for reencode mode
option.reencode-result-path=Restore result file path to use for reencode mode
option.chunk-data-size=Payload chunk size per QR
option.qr-image-size=QR image size in pixels
option.qr-error-level=QR error correction level: ${COMPLETION-CANDIDATES}
option.label-height=Height of the label area below the QR in pixels
option.convert-xlsx-to-csv=Convert XLSX files to CSV before encoding
option.convert-office-to-text=Convert DOCX/PPTX files to text before encoding
option.folder-structure=Keep the output folder structure aligned with the source structure (default: ${DEFAULT-VALUE})
option.files-per-folder=Number of QR images per folder when folder-structure=false
option.print-html=Generate print-friendly HTML
option.target-extensions=Target file extensions, separated by commas
option.skip-dirs=Directory names to skip during scanning, separated by commas
option.exclude-paths=Paths to exclude from encoding, separated by commas
