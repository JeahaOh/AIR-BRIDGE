command.description=sender 측 작업을 수행하는 CLI 도구입니다.
command.encode.description=소스 파일과 문서를 QR 이미지로 인코딩합니다.
command.reencode.description=복원 결과를 기준으로 실패 파일 또는 누락 청크를 다시 생성합니다.
command.slide.description=번들된 Swing 슬라이드 재생기를 실행합니다.
option.lang=도움말과 설명에 사용할 언어: ${COMPLETION-CANDIDATES}
option.in=읽어올 입력 디렉토리
option.out=출력 디렉토리
option.project-name=프로젝트명
option.encode-root=QR 내부에 저장할 상대경로 기준점. 생략 시 --in 기준
option.restore-dir=reencode 모드에서 _restore_result.txt 기본 위치 디렉토리
option.reencode-result-path=reencode 모드에서 사용할 복원 결과 파일 경로
option.chunk-data-size=QR 하나당 데이터 청크 크기
option.qr-image-size=QR 이미지 크기(픽셀)
option.qr-error-level=QR 오류정정 레벨: ${COMPLETION-CANDIDATES}
option.label-height=QR 하단 라벨 영역 높이(픽셀)
option.convert-xlsx-to-csv=XLSX 파일을 CSV로 변환해서 인코딩
option.convert-office-to-text=DOCX/PPTX 파일을 텍스트로 변환해서 인코딩
option.folder-structure=출력 폴더 구조를 소스 구조와 동일하게 유지 (기본값: ${DEFAULT-VALUE})
option.files-per-folder=folder-structure=false일 때 폴더당 QR 이미지 수
option.print-html=인쇄용 HTML 생성
option.target-extensions=대상 확장자 목록. 쉼표로 구분
option.skip-dirs=탐색에서 제외할 디렉토리명 목록. 쉼표로 구분
option.exclude-paths=인코딩에서 제외할 경로 목록. 쉼표로 구분
